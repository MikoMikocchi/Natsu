name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: mobile-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-check:
    name: CI check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run CI checks
        run: ./gradlew ciCheck --no-daemon --no-configuration-cache

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: kover-xml-report
          path: build/reports/kover/report.xml
          if-no-files-found: error

  release-build:
    name: Release build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble prod release
        run: ./gradlew assembleProdRelease --no-daemon --no-configuration-cache

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: prod-release-apk
          path: app/build/outputs/apk/prod/release/*.apk
