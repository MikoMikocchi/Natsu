name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: mobile-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run static analysis
        run: ./gradlew staticAnalysisCheck --build-cache

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests with coverage
        run: ./gradlew quickCheck koverXmlReport -PenableKover=true --build-cache

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: kover-xml-report
          path: build/reports/kover/report.xml
          if-no-files-found: error

  ci-check:
    name: CI check (aggregate)
    runs-on: ubuntu-latest
    needs:
      - static-analysis
      - unit-tests
    if: always()
    steps:
      - name: Require passing checks
        run: |
          if [[ "${{ needs.static-analysis.result }}" != "success" || "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi

  release-build:
    name: Release build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble prod release
        run: ./gradlew assembleProdRelease --build-cache

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: prod-release-apk
          path: app/build/outputs/apk/prod/release/*.apk
